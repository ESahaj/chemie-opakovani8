<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chemické kvízy – výběr tématu</title>
  <style>
    :root {
      --bg: #fff7d6;
      --panel: #ffffff;
      --text: #242424;
      --muted: #666666;
      --primary: #ffea00;
      --accent: #ff2f2f;
      --accent-dark: #c91414;
      --ok: #1f9d55;
      --bad: #d93025;
      --shadow: 0 18px 45px rgba(120, 45, 0, 0.18);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 47, 47, 0.18), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(255, 234, 0, 0.5), transparent 28rem),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(1040px, 100%);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 47, 47, 0.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px clamp(18px, 4vw, 34px);
      background: linear-gradient(135deg, var(--primary), #fff6a3);
      border-bottom: 3px solid rgba(255, 47, 47, 0.3);
    }

    .brand { display: flex; align-items: center; gap: 14px; }

    .logo {
      width: 64px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: grid;
      place-items: center;
      background: var(--primary);
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.22);
      flex: 0 0 auto;
    }

    .logo svg { width: 45px; height: 45px; }
    h1 { margin: 0; font-size: clamp(1.45rem, 3vw, 2.35rem); line-height: 1; }
    .subtitle { margin: 5px 0 0; color: #5f3200; font-weight: 650; font-size: clamp(0.9rem, 1.8vw, 1rem); }

    .scorebar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .pill { background: rgba(255, 255, 255, 0.75); border: 1px solid rgba(201, 20, 20, 0.2); border-radius: 999px; padding: 9px 13px; font-weight: 800; white-space: nowrap; }

    main { padding: clamp(18px, 4vw, 36px); }
    .screen { display: none; }
    .screen.active { display: block; animation: fade 220ms ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .intro, .result-card, .question-card {
      background: var(--panel);
      border-radius: var(--radius);
      padding: clamp(20px, 4vw, 34px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
    }

    .intro h2, .result-card h2 { margin-top: 0; font-size: clamp(1.5rem, 3vw, 2.2rem); }
    .intro p, .result-card p { color: var(--muted); font-size: 1.06rem; line-height: 1.55; }

    .settings { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; margin: 24px 0; }
    .field { display: grid; gap: 8px; }
    label { font-weight: 900; color: #5f3200; }
    select, button { font: inherit; }
    select { width: 100%; padding: 13px 14px; border-radius: 15px; border: 2px solid rgba(255, 47, 47, 0.22); background: #fff; color: var(--text); font-weight: 750; }

    .count-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .count-options input { position: absolute; opacity: 0; pointer-events: none; }
    .count-options span { display: grid; place-items: center; min-height: 51px; border-radius: 15px; border: 2px solid rgba(255, 47, 47, 0.22); background: #fff; font-weight: 950; cursor: pointer; }
    .count-options input:checked + span { background: #ff2f2f; color: #fff; border-color: #ff2f2f; box-shadow: 0 10px 18px rgba(201, 20, 20, 0.18); }

    .topic-preview { margin-top: 10px; padding: 14px 16px; border-radius: 16px; background: #fff8cf; border: 2px solid rgba(255, 47, 47, 0.14); color: #6c3a00; font-weight: 750; }

    .btn { border: 0; border-radius: 16px; padding: 14px 18px; cursor: pointer; font-weight: 900; transition: transform 130ms ease, filter 130ms ease, box-shadow 130ms ease; box-shadow: 0 10px 18px rgba(201, 20, 20, 0.18); }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.02); }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: #ffe66d; color: #491b00; box-shadow: none; }

    .topline { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; color: var(--muted); font-weight: 800; }
    .progress { height: 12px; background: #ffe8e8; border-radius: 999px; overflow: hidden; margin: 0 0 24px; }
    .progress > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #ff9c00); border-radius: inherit; transition: width 260ms ease; }
    .question { font-size: clamp(1.3rem, 3vw, 2rem); margin: 0 0 22px; line-height: 1.25; }
    .answers { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .answer { min-height: 76px; text-align: left; border: 2px solid rgba(0, 0, 0, 0.08); border-radius: 18px; background: #fff; padding: 16px; cursor: pointer; font-weight: 800; color: var(--text); transition: transform 120ms ease, border-color 120ms ease, background 120ms ease; }
    .answer:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--accent); background: #fffdf0; }
    .answer:disabled { cursor: not-allowed; }
    .answer.correct { border-color: var(--ok); background: #e9f8ef; }
    .answer.wrong { border-color: var(--bad); background: #fdecea; }

    .feedback { margin-top: 18px; padding: 14px 16px; border-radius: 16px; background: #f7f7f7; display: none; line-height: 1.5; font-weight: 650; }
    .feedback.show { display: block; }
    .actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 22px; flex-wrap: wrap; }

    .result-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin: 24px 0; }
    .stat { background: #fff8cf; border: 2px solid rgba(255, 47, 47, 0.18); border-radius: 20px; padding: 22px; text-align: center; }
    .stat strong { display: block; font-size: clamp(2.2rem, 6vw, 4rem); color: var(--accent-dark); line-height: 1; }
    .stat span { display: block; margin-top: 8px; color: #6c3a00; font-weight: 900; }
    .review { display: grid; gap: 10px; margin-top: 18px; }
    .review-item { border-left: 6px solid #ddd; background: #fafafa; border-radius: 14px; padding: 13px 14px; line-height: 1.4; }
    .review-item.good { border-left-color: var(--ok); }
    .review-item.bad { border-left-color: var(--bad); }
    .small { color: var(--muted); font-size: 0.93rem; margin-top: 6px; }

    @media (max-width: 720px) {
      header { align-items: flex-start; flex-direction: column; }
      .scorebar { justify-content: flex-start; }
      .answers, .settings, .result-grid { grid-template-columns: 1fr; }
      .answer { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"><svg viewBox="0 0 100 100" role="img"><polygon points="56 5 22 57 48 48 44 95 78 38 52 48" fill="#ff2f2f"></polygon></svg></div>
        <div>
          <h1 id="headerTitle">Chemické kvízy</h1>
          <p class="subtitle" id="headerSubtitle">Vyber téma a počet otázek</p>
        </div>
      </div>
      <div class="scorebar" aria-label="Stav hry">
        <div class="pill">Otázka: <span id="roundNow">0</span>/<span id="roundTotal">0</span></div>
        <div class="pill">Energie: <span id="lightnings">0</span></div>
      </div>
    </header>

    <main>
      <section id="startScreen" class="screen active">
        <div class="intro">
          <h2>Vyber si kvíz</h2>
          <p>Nejdřív zvol téma a počet otázek. Kvíz pak náhodně vybere otázky z daného balíčku.</p>

          <div class="settings">
            <div class="field">
              <label for="topicSelect">Téma</label>
              <select id="topicSelect"></select>
              <div id="topicPreview" class="topic-preview"></div>
            </div>
            <div class="field">
              <label>Počet otázek</label>
              <div class="count-options" role="radiogroup" aria-label="Počet otázek">
                <label><input type="radio" name="questionCount" value="5"><span>5</span></label>
                <label><input type="radio" name="questionCount" value="10" checked><span>10</span></label>
                <label><input type="radio" name="questionCount" value="20"><span>20</span></label>
              </div>
            </div>
          </div>

          <button class="btn btn-primary" id="startBtn">Spustit hru</button>
        </div>
      </section>

      <section id="gameScreen" class="screen">
        <div class="question-card">
          <div class="topline"><span id="topicLabel">Téma</span><span id="scoreLabel">Správně: 0</span></div>
          <div class="progress" aria-label="Průběh kola"><div id="progressBar"></div></div>
          <h2 id="questionText" class="question"></h2>
          <div id="answers" class="answers"></div>
          <div id="feedback" class="feedback"></div>
          <div class="actions">
            <button class="btn btn-secondary" id="homeBtn">Zpět na výběr</button>
            <button class="btn btn-secondary" id="nextBtn" hidden>Další otázka</button>
          </div>
        </div>
      </section>

      <section id="resultScreen" class="screen">
        <div class="result-card">
          <h2>Výsledek kola</h2>
          <p id="resultMessage"></p>
          <div class="result-grid">
            <div class="stat"><strong id="finalScore">0/10</strong><span>správných odpovědí</span></div>
            <div class="stat"><strong id="finalLightnings">0</strong><span>získané energie</span></div>
          </div>
          <div class="actions">
            <button class="btn btn-secondary" id="showReviewBtn">Zobrazit přehled</button>
            <button class="btn btn-secondary" id="backToMenuBtn">Vybrat jiné téma</button>
            <button class="btn btn-primary" id="restartBtn">Hrát znovu stejné téma</button>
          </div>
          <div id="review" class="review" hidden></div>
        </div>
      </section>
    </main>
  </div>

  <script>

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function makeOptions(correct, allOptions) {
      const wrongOptions = shuffle(allOptions.filter(option => option !== correct)).slice(0, 3);
      return shuffle([correct, ...wrongOptions]);
    }

    function createElementQuestion(element, direction, elements) {
      if (direction === "nameToSymbol") {
        const symbolOptions = makeOptions(element.symbol, elements.map(item => item.symbol));
        return {
          question: `Jakou chemickou značku má prvek ${element.name}?`,
          answers: symbolOptions,
          correct: symbolOptions.indexOf(element.symbol),
          explanation: `Prvek ${element.name} má chemickou značku ${element.symbol}.`
        };
      }

      const nameOptions = makeOptions(element.name, elements.map(item => item.name));
      return {
        question: `Jaký název má chemická značka ${element.symbol}?`,
        answers: nameOptions,
        correct: nameOptions.indexOf(element.name),
        explanation: `Chemická značka ${element.symbol} patří prvku ${element.name}.`
      };
    }

    function createElementRound(topic, requestedCount) {
      const total = Math.min(requestedCount, topic.elements.length * 2);
      const nameToSymbolCount = Math.ceil(total / 2);
      const symbolToNameCount = Math.floor(total / 2);
      const shuffledElements = shuffle(topic.elements);

      const nameToSymbol = shuffledElements
        .slice(0, nameToSymbolCount)
        .map(element => createElementQuestion(element, "nameToSymbol", topic.elements));

      const symbolToName = shuffledElements
        .slice(nameToSymbolCount, nameToSymbolCount + symbolToNameCount)
        .map(element => createElementQuestion(element, "symbolToName", topic.elements));

      return shuffle([...nameToSymbol, ...symbolToName]);
    }

    const state = {
      selectedTopic: topics[0],
      requestedCount: 10,
      round: [],
      current: 0,
      score: 0,
      lightnings: 0,
      answered: false,
      history: []
    };

    const $ = (id) => document.getElementById(id);
    const screens = { start: $("startScreen"), game: $("gameScreen"), result: $("resultScreen") };

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
    }

    function populateTopicSelect() {
      const select = $("topicSelect");
      select.innerHTML = "";
      topics.forEach(topic => {
        const option = document.createElement("option");
        option.value = topic.id;
        option.textContent = topic.title;
        select.appendChild(option);
      });
      updateTopicPreview();
    }

    function getSelectedTopic() {
      const selectedId = $("topicSelect").value;
      return topics.find(topic => topic.id === selectedId) || topics[0];
    }

    function getSelectedCount() {
      return Number(document.querySelector('input[name="questionCount"]:checked').value);
    }

    function updateTopicPreview() {
      const topic = getSelectedTopic();
      const total = topic.type === "elements" ? topic.elements.length * 2 : topic.questions.length;
      $("topicPreview").textContent = `${topic.subtitle} • dostupných otázek: ${total}`;
    }

    function buildRound(topic, requestedCount) {
      if (topic.type === "elements") return createElementRound(topic, requestedCount);
      return shuffle(topic.questions).slice(0, Math.min(requestedCount, topic.questions.length));
    }

    function startGame() {
      state.selectedTopic = getSelectedTopic();
      state.requestedCount = getSelectedCount();
      state.round = buildRound(state.selectedTopic, state.requestedCount);
      state.current = 0;
      state.score = 0;
      state.lightnings = 0;
      state.answered = false;
      state.history = [];
      $("review").hidden = true;
      $("showReviewBtn").textContent = "Zobrazit přehled";
      $("headerTitle").textContent = state.selectedTopic.title;
      $("headerSubtitle").textContent = state.selectedTopic.subtitle;
      $("topicLabel").textContent = state.selectedTopic.title;
      showScreen("game");
      renderQuestion();
    }

    function updateHeader() {
      const total = state.round.length;
      $("roundNow").textContent = total ? Math.min(state.current + 1, total) : 0;
      $("roundTotal").textContent = total;
      $("lightnings").textContent = state.lightnings;
      $("scoreLabel").textContent = `Správně: ${state.score}`;
      const progress = total ? (state.current / total) * 100 : 0;
      $("progressBar").style.width = `${progress}%`;
    }

    function renderQuestion() {
      const q = state.round[state.current];
      state.answered = false;
      $("questionText").textContent = q.question;
      $("feedback").className = "feedback";
      $("feedback").textContent = "";
      $("nextBtn").hidden = true;
      $("answers").innerHTML = "";
      updateHeader();

      const mappedAnswers = q.answers.map((text, originalIndex) => ({ text, originalIndex }));
      shuffle(mappedAnswers).forEach((answer, visibleIndex) => {
        const button = document.createElement("button");
        button.className = "answer";
        button.type = "button";
        button.innerHTML = `<span aria-hidden="true">${String.fromCharCode(65 + visibleIndex)}.</span> ${answer.text}`;
        button.addEventListener("click", () => chooseAnswer(button, answer.originalIndex));
        $("answers").appendChild(button);
      });
    }

    function chooseAnswer(button, selectedIndex) {
      if (state.answered) return;
      state.answered = true;

      const q = state.round[state.current];
      const isCorrect = selectedIndex === q.correct;
      const buttons = [...document.querySelectorAll(".answer")];

      buttons.forEach(btn => {
        btn.disabled = true;
        const text = btn.textContent.replace(/^[A-D]\.\s*/, "").trim();
        const originalIndex = q.answers.indexOf(text);
        if (originalIndex === q.correct) btn.classList.add("correct");
      });

      if (isCorrect) {
        state.score += 1;
        state.lightnings += 1;
        button.classList.add("correct");
        $("feedback").innerHTML = `✅ Správně! Získáváš energii.<br><span class="small">${q.explanation || ""}</span>`;
      } else {
        button.classList.add("wrong");
        $("feedback").innerHTML = `❌ To není správně. Správná odpověď: <strong>${q.answers[q.correct]}</strong>.<br><span class="small">${q.explanation || ""}</span>`;
      }

      state.history.push({ question: q.question, selected: q.answers[selectedIndex], correct: q.answers[q.correct], isCorrect });
      $("feedback").classList.add("show");
      $("nextBtn").hidden = false;
      updateHeader();
    }

    function nextQuestion() {
      state.current += 1;
      if (state.current >= state.round.length) showResults();
      else renderQuestion();
    }

    function showResults() {
      $("roundNow").textContent = state.round.length;
      $("roundTotal").textContent = state.round.length;
      $("progressBar").style.width = "100%";
      showScreen("result");

      const total = state.round.length;
      const percent = Math.round((state.score / total) * 100);
      $("finalScore").textContent = `${state.score}/${total}`;
      $("finalLightnings").textContent = state.lightnings;

      let message = `Téma: ${state.selectedTopic.title}. Dobrá práce!`;
      if (percent === 100) message = `Téma: ${state.selectedTopic.title}. Perfektní výsledek! Máš maximum energie.`;
      else if (percent >= 80) message = `Téma: ${state.selectedTopic.title}. Výborně! Většinu otázek máš správně.`;
      else if (percent >= 50) message = `Téma: ${state.selectedTopic.title}. Slušný výkon. Ještě pár pokusů a bude to skvělé.`;
      else message = `Téma: ${state.selectedTopic.title}. Nevadí, zkus další kolo a nasbírej více energie.`;
      $("resultMessage").textContent = message;
      renderReview();
    }

    function renderReview() {
      const review = $("review");
      review.innerHTML = "";
      state.history.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = `review-item ${item.isCorrect ? "good" : "bad"}`;
        div.innerHTML = `<strong>${index + 1}. ${item.question}</strong><div class="small">Tvoje odpověď: ${item.selected}</div><div class="small">Správně: ${item.correct}</div>`;
        review.appendChild(div);
      });
    }

    function goHome() {
      showScreen("start");
      $("headerTitle").textContent = "Chemické kvízy";
      $("headerSubtitle").textContent = "Vyber téma a počet otázek";
      $("roundNow").textContent = "0";
      $("roundTotal").textContent = "0";
      $("lightnings").textContent = "0";
      $("progressBar").style.width = "0%";
    }

    $("topicSelect").addEventListener("change", updateTopicPreview);
    document.querySelectorAll('input[name="questionCount"]').forEach(input => input.addEventListener("change", updateTopicPreview));
    $("startBtn").addEventListener("click", startGame);
    $("nextBtn").addEventListener("click", nextQuestion);
    $("homeBtn").addEventListener("click", goHome);
    $("backToMenuBtn").addEventListener("click", goHome);
    $("restartBtn").addEventListener("click", startGame);
    $("showReviewBtn").addEventListener("click", () => {
      const review = $("review");
      review.hidden = !review.hidden;
      $("showReviewBtn").textContent = review.hidden ? "Zobrazit přehled" : "Skrýt přehled";
    });

    populateTopicSelect();
    goHome();
  </script>
