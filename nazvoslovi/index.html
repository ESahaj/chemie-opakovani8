    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function mixTasksByAnion(originalTasks) {
      const groups = {};
      originalTasks.forEach((task) => {
        if (!groups[task.anion]) groups[task.anion] = [];
        groups[task.anion].push(task);
      });

      Object.values(groups).forEach(shuffleArray);

      const mixed = [];
      let previousAnion = null;

      while (mixed.length < originalTasks.length) {
        const availableAnions = Object.keys(groups).filter((anion) => groups[anion].length > 0);
        let choices = availableAnions.filter((anion) => anion !== previousAnion);
        if (choices.length === 0) choices = availableAnions;

        choices.sort((a, b) => groups[b].length - groups[a].length || Math.random() - 0.5);
        const topCount = groups[choices[0]].length;
        const bestChoices = choices.filter((anion) => groups[anion].length === topCount);
        const selectedAnion = bestChoices[Math.floor(Math.random() * bestChoices.length)];

        mixed.push(groups[selectedAnion].pop());
        previousAnion = selectedAnion;
      }

      return mixed;
    }

        .replaceAll("ⅵ", "vi")
        .replaceAll("ⅶ", "vii")
        .replaceAll("ⅷ", "viii");

      if (text === "1-" || text === "-1" || text === "-i") return "-";
      if (text === "2-" || text === "-2" || text === "-ii") return "2-";
      if (text === "3-" || text === "-3" || text === "-iii") return "3-";
      return text;
    }

    function clearFields() {
      inputs.forEach(([id]) => {
        el(id).value = "";
        el(id).classList.remove("ok", "bad");
      });
      el("message").className = "message";
      el("message").innerHTML = "";
    }

    function loadTask() {
      const task = tasks[current];
      el("givenAnion").textContent = task.anion;
      el("givenStem").textContent = task.stem;
      el("givenSuffix").textContent = task.suffix;
      clearFields();
    }

    function checkAnswers() {
      const task = tasks[current];
      let allOk = true;

      inputs.forEach(([id, key]) => {
        const ok = normalize(el(id).value) === normalize(task[key]);
        el(id).classList.toggle("ok", ok);
        el(id).classList.toggle("bad", !ok);
        if (!ok) allOk = false;
      });

      el("message").className = "message " + (allOk ? "ok" : "bad");
      el("message").innerHTML = allOk
        ? "Správně ✅"
        : "Něco nesedí ❌ Červeně orámovaná políčka oprav.";
    }

    function showSolution() {
      const task = tasks[current];

      inputs.forEach(([id, key]) => {
        el(id).value = task[key];
        el(id).classList.remove("bad");
        el(id).classList.add("ok");
      });

      el("message").className = "message info";
      el("message").innerHTML =
        "<strong>Řešení je vyplněné přímo v okýnkách.</strong><br>" +
        "Prvek <strong>" + task.element + "</strong>, oxidační číslo <strong>" + task.oxRoman + "</strong>; " +
        "částice <strong>" + task.anionParticle + "</strong>, náboj aniontu římsky <strong>" + task.anionChargeTop + "</strong>.<br>" +
        "Dolní levé okýnko = arabské číslo z pravého horního římského náboje bez znaménka: <strong>" + task.leftCount + "</strong>. " +
        "Dolní pravé okýnko = arabské číslo z levého horního římského oxidačního čísla: <strong>" + task.rightCount + "</strong>.<br>" +
        "Vzorec: <strong style='font-size:1.35em;color:#001c8f;'>" + task.formula + "</strong>.";
    }

    function nextTask() {
      current = (current + 1) % tasks.length;
      loadTask();
    }

    el("checkBtn").addEventListener("click", checkAnswers);
    el("solutionBtn").addEventListener("click", showSolution);
    el("nextBtn").addEventListener("click", nextTask);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter") checkAnswers();
    });

    loadTask();
  </script>
</body>
</html>
